name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Back up app source
        run: |
          mkdir -p /tmp/backup
          cp pubspec.yaml /tmp/backup/pubspec.yaml
          cp -r lib /tmp/backup/lib

      - name: Generate Android platform folders
        run: flutter create --platforms=android --project-name my_week --org com.example .

      - name: Restore app source
        run: |
          cp /tmp/backup/pubspec.yaml pubspec.yaml
          rm -rf lib
          cp -r /tmp/backup/lib lib

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-week-apk
          path: build/app/outputs/flutter-apk/app-release.apk
